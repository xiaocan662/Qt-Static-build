name: build_Qt6_msvc2022

# 关键：手动触发配置
on:
  workflow_dispatch:
    inputs:
      qt_version:
        description: '指定 Qt 版本（留空则自动获取最新）'
        required: false
        default: ''

env:
  FILE_NAME: static-Release_msvc2022_64

jobs:
  windows_msvc_static_release:
    runs-on: windows-latest

    steps:
    # 1. 检出本仓库
    - name: Checkout repository
      uses: actions/checkout@v6

    # 2. 安装 7-Zip（打包必须）
    - name: Install 7-Zip
      run: choco install 7zip -y

    # 3. 安装 Python（你的脚本需要）
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        architecture: 'x64'

    # 4. 安装 MSVC 构建工具
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3
      with:
        msbuild-architecture: x64

    # 5. 安装 vsdevenv
    - name: Setup vsdevenv
      uses: seanmiddleditch/gha-setup-vsdevenv@master

    # 6. 获取 Qt 版本（支持手动指定或自动获取最新）
    - name: Get Qt Version
      run: |
        if (-not [string]::IsNullOrEmpty('${{ github.event.inputs.qt_version }}')) {
          # 如果手动指定了版本，直接使用
          $qtFull = '${{ github.event.inputs.qt_version }}'
          $qtMinor = $qtFull -replace '^(\d+\.\d+).*', '$1'
        } else {
          # 自动获取最新版本
          $qtMirror = "https://mirrors.aliyun.com/qt"
          $qtMinor = (curl -s "$qtMirror/official_releases/qt/" | `
            Select-String -Pattern '\d+\.\d+/' | `
            ForEach-Object { [regex]::Match($_, '\d+\.\d+').Value } | `
            Sort-Object { [version]$_ } -Descending | `
            Select-Object -First 1)
          
          $qtFull = (curl -s "$qtMirror/official_releases/qt/$qtMinor/" | `
            Select-String -Pattern '\d+\.\d+\.\d+/' | `
            ForEach-Object { [regex]::Match($_, '\d+\.\d+\.\d+').Value } | `
            Sort-Object { [version]$_ } -Descending | `
            Select-Object -First 1)
        }

        echo "QT_VERSION=$qtFull" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        echo "QT_VERSION2=$qtMinor" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        echo "QT_ROOT=../Qt/$qtFull-static" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    # 7. 构建 Qt（修复了解压和路径问题）
    - name: Build Qt
      run: |
        $repoRoot = $env:GITHUB_WORKSPACE
        $parentDir = Split-Path $repoRoot -Parent
        $qtBase = Join-Path $parentDir "Qt"

        # 创建文件夹
        New-Item -ItemType Directory -Path $qtBase -Force | Out-Null
        Set-Location $qtBase

        New-Item -ItemType Directory -Path "./${{env.QT_VERSION}}" -Force | Out-Null
        New-Item -ItemType Directory -Path "./${{env.QT_VERSION}}-static" -Force | Out-Null

        # 下载源代码（异步下载 + 定时打印进度，避免大文件下载时长时间无日志看起来像卡住）
        [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol -bor [Net.SecurityProtocolType]::Tls12
        $url = "https://mirrors.aliyun.com/qt/official_releases/qt/${{env.QT_VERSION2}}/${{env.QT_VERSION}}/single/qt-everywhere-src-${{env.QT_VERSION}}.zip"
        $outFile = "$qtBase\qt-everywhere-src.zip"
        Write-Host "Downloading Qt from: $url"
        Write-Host "Saving to: $outFile"

        try {
          $req = [System.Net.HttpWebRequest]::Create($url)
          $req.Method = 'HEAD'
          $req.UserAgent = 'Mozilla/5.0'
          $resp = $req.GetResponse()
          $totalBytes = $resp.ContentLength
          $resp.Close()
          Write-Host ("Expected size: {0:N2} MB" -f ($totalBytes / 1MB))
        } catch {
          $totalBytes = -1
          Write-Host "HEAD failed, will download without total size."
        }

        $ProgressPreference = 'SilentlyContinue'
        $wc = New-Object System.Net.WebClient
        $wc.Headers.Add('User-Agent', 'Mozilla/5.0')
        $sw = [System.Diagnostics.Stopwatch]::StartNew()
        $task = $wc.DownloadFileTaskAsync($url, $outFile)

        while (-not $task.Wait(10000)) {
          try {
            $fi = Get-Item $outFile -ErrorAction SilentlyContinue
            $cur = if ($fi) { $fi.Length } else { 0 }
            $elapsed = $sw.Elapsed.TotalSeconds
            $speed = if ($elapsed -gt 0) { $cur / $elapsed } else { 0 }
            if ($totalBytes -gt 0) {
              $pct = [math]::Min(100.0, [double]$cur / $totalBytes * 100)
              Write-Host ("[{0}s] {1:N2} MB / {2:N2} MB  ({3:N1}%)  {4:N2} MB/s" -f `
                [math]::Floor($elapsed), ($cur / 1MB), ($totalBytes / 1MB), $pct, ($speed / 1MB))
            } else {
              Write-Host ("[{0}s] {1:N2} MB downloaded, {2:N2} MB/s" -f `
                [math]::Floor($elapsed), ($cur / 1MB), ($speed / 1MB))
            }
          } catch {}
        }
        $sw.Stop()

        if ($task.IsFaulted) {
          Write-Host "Download failed:"
          Write-Host $task.Exception.ToString()
          exit 1
        }
        $wc.Dispose()
        $finalSize = (Get-Item $outFile).Length
        Write-Host ("Download done in {0:N0}s, final size {1:N2} MB" -f $sw.Elapsed.TotalSeconds, ($finalSize / 1MB))

        # 解压源代码（Windows 原生支持）
        Expand-Archive -Path "qt-everywhere-src.zip" -DestinationPath "./${{env.QT_VERSION}}" -Force

        # 调用编译脚本（修正了路径传递方式）
        $buildScript = Join-Path $repoRoot "build-Qt6\build-Qt6msvc2022_64.cmd"
        if (-not (Test-Path $buildScript)) {
          Write-Error "Build script not found: $buildScript"
          exit 1
        }
        Write-Host "Running build script: $buildScript"
        $env:QT_PATH = (Get-Location).Path
        cmd /c "`"$buildScript`""

    # 8. 打包（修复了 7z 路径和文件名）
    - name: Package binaries
      run: |
        $archiveName = "Qt_${{env.QT_VERSION}}-${{env.FILE_NAME}}.7z"
        $qtStaticPath = "${{env.QT_ROOT}}"
        Write-Host "Packing $qtStaticPath to $archiveName"
        7z a $archiveName $qtStaticPath -mx=9

    # 9. 上传 artifacts
    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: Qt_${{env.QT_VERSION}}-${{env.FILE_NAME}}
        path: Qt_${{env.QT_VERSION}}-${{env.FILE_NAME}}.7z
        retention-days: 30

    # 10. 发布到 Release（修复了 tag 命名，避免特殊字符）
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "temp-qt-${{env.QT_VERSION}}-${{env.FILE_NAME}}"
        name: "Temp Release: Qt ${{env.QT_VERSION}} ${{env.FILE_NAME}}"
        files: Qt_${{env.QT_VERSION}}-${{env.FILE_NAME}}.7z
        prerelease: true