name: build_Qt6_msvc2022

on: workflow_dispatch
#on: [push, pull_request]

env:
  FILE_NAME: static-Release_msvc2022_64

jobs:
  windows_msvc_static_release:
    runs-on: windows-latest

    steps:
    # 检出本仓库
    - name: Checkout repository
      uses: actions/checkout@v6

    # 安装python
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        architecture: 'x64'

    # 安装msvc
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3
      with:
        msbuild-architecture: x64

    # 安装vsdevenv
    - name: Setup vsdevenv
      uses: seanmiddleditch/gha-setup-vsdevenv@master

    # 自动获取最新 Qt 版本号
    - name: Get Latest Qt Version
      run: |
        # 1. 获取最新的次要版本目录（如 6.10）
        $qtMinor = (curl -s https://download.qt.io/official_releases/qt/ | `
          Select-String -Pattern '\d+\.\d+/' | `
          ForEach-Object { [regex]::Match($_, '\d+\.\d+').Value } | `
          Sort-Object { [version]$_ } -Descending | `
          Select-Object -First 1)
        echo "Latest minor version: $qtMinor"

        # 2. 获取该目录下的最新补丁版本（如 6.10.3）
        $qtFull = (curl -s "https://download.qt.io/official_releases/qt/$qtMinor/" | `
          Select-String -Pattern '\d+\.\d+\.\d+/' | `
          ForEach-Object { [regex]::Match($_, '\d+\.\d+\.\d+').Value } | `
          Sort-Object { [version]$_ } -Descending | `
          Select-Object -First 1)
        echo "Latest full version: $qtFull"

        # 3. 设置为环境变量（给后续 step 使用）
        echo "QT_VERSION=$qtFull" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        echo "QT_VERSION2=$qtMinor" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

    # 构建Qt
    - name: Build Qt
      run: |
        $repoRoot = $env:GITHUB_WORKSPACE
        $parentDir = Split-Path $repoRoot -Parent
        $qtBase = Join-Path $parentDir "Qt"

        # 创建文件夹
        if (-not (Test-Path $qtBase)) { New-Item -ItemType Directory -Path $qtBase | Out-Null }
        Set-Location $qtBase

        New-Item -ItemType Directory -Path "./${{env.QT_VERSION}}" -Force | Out-Null
        New-Item -ItemType Directory -Path "./${{env.QT_VERSION}}-static" -Force | Out-Null

        # 下载源代码并解压
        curl -L -o qt-everywhere-src.zip "https://download.qt.io/official_releases/qt/${{env.QT_VERSION2}}/${{env.QT_VERSION}}/single/qt-everywhere-src-${{env.QT_VERSION}}.zip"
        unzip -q qt-everywhere-src.zip -d "./${{env.QT_VERSION}}"

        # 调用编译脚本（传入 QT_PATH 供脚本内部使用）
        $qtPath = (Get-Location).Path
        $buildScript = Join-Path $repoRoot "build-Qt6\build-Qt6msvc2022_64.cmd"
        cmd /c "set `"QT_PATH=$qtPath`" && call `"$buildScript`""

    # 打包
    - name: Package binaries
      run: |
        #ls     #Directory: D:\a\buildQt\buildQt(即仓库目录)
        7z a Qt_${{env.QT_VERSION}}-${{env.FILE_NAME}}.7z ../Qt/${{env.QT_VERSION}}-static -mx=9

    # 上传
    - uses: actions/upload-artifact@v7
      with:
        name: Qt_${{env.QT_VERSION}}-${{env.FILE_NAME}}
        path: Qt_${{env.QT_VERSION}}-${{env.FILE_NAME}}.7z

    # 发布
    - name: TempRelease
      uses: softprops/action-gh-release@v2
      with:
        tag_name: temp_Qt_${{env.QT_VERSION}}-${{env.FILE_NAME}}
        release_name: TempRelease_Qt_${{env.QT_VERSION}}-${{env.FILE_NAME}}
        files: Qt_${{env.QT_VERSION}}-${{env.FILE_NAME}}.7z